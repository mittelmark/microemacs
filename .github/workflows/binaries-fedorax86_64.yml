name: Binaries Fedora Linux (self-hosted)

on:
  workflow_dispatch:
    branches: [ master, dev ]

jobs:
  build:
    runs-on: self-hosted  # Self-hosted runner label
    steps:
    - uses: actions/checkout@v4
     
    - name: Detect system info
      id: system
      run: |
        export DIST=$(grep '^ID=' /etc/os-release | sed -E 's/ID=//')
        export OSV=$(grep 'VERSION_ID=' /etc/os-release | sed -E 's/VERSION_ID="?([0-9]+).*"?/\1/')
        export KERNEL=$(uname -r | grep -oE '^[0-9]+')
        export MACHINE=$(uname -m)
        export VRS=$(grep -E '^#define me' src/evers.h | head -n 3 | grep -Eo '"[0-9b]+"' | tr -d '"' | paste -sd '')
        echo "DIST=$DIST" >> $GITHUB_ENV
        echo "OSV=$OSV" >> $GITHUB_ENV
        echo "KERNEL=$KERNEL" >> $GITHUB_ENV
        echo "MACHINE=$MACHINE" >> $GITHUB_ENV
        echo "VRS=$VRS" >> $GITHUB_ENV
        echo "RELEASE_PREFIX=linux-$KERNEL-$MACHINE-$DIST-$OSV" >> $GITHUB_ENV
        echo "System: linux-$KERNEL-$MACHINE-$DIST-$OSV, ME version: $VRS"

    - name: Install dependencies (Debian/Ubuntu)
      if: contains(env.DIST, 'ubuntu') || contains(env.DIST, 'debian')
      run: |
        sudo apt install -y build-essential libxt-dev
        sudo apt install -y gcc gcc-c++ make zlib-devel ncurses-devel libXt-devel || true

    - name: Install dependencies (Fedora/RHEL)
      if: contains(env.DIST, 'fedora') || contains(env.DIST, 'rhel') || contains(env.DIST, 'centos') || contains(env.DIST, 'rocky') || contains(env.DIST, 'almalinux')
      run: |
        sudo dnf install -y gcc gcc-c++ make zlib-devel ncurses-devel libXt-devel

    - name: Install dependencies (Arch)
      if: contains(env.DIST, 'arch')
      run: |
        sudo pacman -S --noconfirm base-devel zlib ncurses libxt

    - name: Extract branch name
      run: echo "BRANCH_NAME=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV
        
    - name: make bfs binary
      run:  make -f linux32gcc.gmk bfs/bin

    - name: make mec binary       
      run:  make -f linux32gcc.gmk mec

    - name: make mew binary       
      run:  make -f linux32gcc.gmk mew

    - name: make mecw binary       
      run:  make -f linux32gcc.gmk mecw

    - name: make mecb binary
      run:  make -f linux32gcc.gmk mecb
    
    - name: make mewb binary
      run:  make -f linux32gcc.gmk mewb
    
    - name: make mecwb binary
      run:  make -f linux32gcc.gmk mecwb

    - name: make brew package
      run:  |
        make -f linux32gcc.gmk brew
        rm -rf brew-*/
    
    - name: Make release
      run: |
        export MEPATH=linux-${{ env.KERNEL }}-${{ env.MACHINE }}-${{ env.DIST }}-${{ env.OSV }}-MicroEmacs09-${{ env.VRS }}-Linux
        mkdir $MEPATH
        mkdir $MEPATH/bin
        mkdir -p $MEPATH/man/1   
        mkdir -p $MEPATH/share/jasspa
        mkdir $MEPATH/share/spelling
        mkdir $MEPATH/share/company        
        cp doc/me.1 $MEPATH/man/1/
        cp bfs/bfs $MEPATH/bin/
        cp src/.linux32gcc-release-mecw/mecw $MEPATH/bin/
        cp src/.linux32gcc-release-mew/mew $MEPATH/bin/
        cp src/.linux32gcc-release-mec/mec  $MEPATH/bin/
        cp linux-*me*.bin $MEPATH/bin/
        cp license.txt $MEPATH/share/jasspa/
        cp COPYING $MEPATH/share/jasspa/
        cp README-standalone.md $MEPATH/share/jasspa/
        cp -r jasspa/macros $MEPATH/share/jasspa/
        echo "Documentation is in share/jasspa" > ${MEPATH}/readme.txt

    - name: Make mecb release
      run: |
        export MEPATH=${{ env.DIST }}${{ env.OSV }}-${{ env.MACHINE }}-MicroEmacs09-${{ env.VRS }}-Linux-mecb
        mkdir $MEPATH
        mkdir $MEPATH/bin
        cp bfs/bfs $MEPATH/bin/
        cp linux-*mecb.bin $MEPATH/bin/
        cp bin/mecu $MEPATH/bin/
        chmod 755 $MEPATH/bin/mecu
        cp license.txt $MEPATH/
        cp COPYING $MEPATH/
        cp README-standalone.md $MEPATH/

    - name: Make mewb release
      run: |
        export MEPATH=${{ env.DIST }}${{ env.OSV }}-${{ env.MACHINE }}-MicroEmacs09-${{ env.VRS }}-Linux-mewb
        mkdir $MEPATH
        mkdir $MEPATH/bin
        cp bfs/bfs $MEPATH/bin/
        cp linux-*mewb.bin $MEPATH/bin/
        cp license.txt $MEPATH/
        cp COPYING $MEPATH/
        cp README-standalone.md $MEPATH/

    - name: Make mecwb release
      run: |
        export MEPATH=${{ env.DIST }}${{ env.OSV }}-${{ env.MACHINE }}-MicroEmacs09-${{ env.VRS }}-Linux-mecwb
        mkdir $MEPATH
        mkdir $MEPATH/bin
        cp bfs/bfs $MEPATH/bin/
        cp linux-*mecwb.bin $MEPATH/bin/
        cp bin/mecu $MEPATH/bin/
        sed -i -E 's/mecb/mecwb -n/' $MEPATH/bin/mecu
        cp license.txt $MEPATH/
        cp COPYING $MEPATH/
        cp README-standalone.md $MEPATH/

    - name: Upload Linux Release files
      uses: actions/upload-artifact@v4
      with: 
        name: linux-${{ env.KERNEL }}-${{ env.MACHINE }}-${{ env.DIST }}-${{ env.OSV }}-MicroEmacs09-${{ env.VRS }}-Linux-${{ env.BRANCH_NAME }}
        path: linux-${{ env.KERNEL }}-${{ env.MACHINE }}-${{ env.DIST }}-${{ env.OSV }}-MicroEmacs09-${{ env.VRS }}-Linux
    
    - name: Upload Linux mecb Release files
      uses: actions/upload-artifact@v4
      with: 
        name: ${{ env.DIST }}${{ env.OSV }}-${{ env.MACHINE }}-MicroEmacs09-${{ env.VRS }}-Linux-mecb-${{ env.BRANCH_NAME }}
        path: ${{ env.DIST }}${{ env.OSV }}-${{ env.MACHINE }}-MicroEmacs09-${{ env.VRS }}-Linux-mecb

    - name: Upload Linux mewb Release files
      uses: actions/upload-artifact@v4
      with: 
        name: ${{ env.DIST }}${{ env.OSV }}-${{ env.MACHINE }}-MicroEmacs09-${{ env.VRS }}-Linux-mewb-${{ env.BRANCH_NAME }}
        path: ${{ env.DIST }}${{ env.OSV }}-${{ env.MACHINE }}-MicroEmacs09-${{ env.VRS }}-Linux-mewb

    - name: Upload Linux mecwb Release files
      uses: actions/upload-artifact@v4
      with: 
        name: ${{ env.DIST }}${{ env.OSV }}-${{ env.MACHINE }}-MicroEmacs09-${{ env.VRS }}-Linux-mecwb-${{ env.BRANCH_NAME }}
        path: ${{ env.DIST }}${{ env.OSV }}-${{ env.MACHINE }}-MicroEmacs09-${{ env.VRS }}-Linux-mecwb

    - name: Combined Release
      run: |
        make -f linux32gcc.gmk release app=mecb
        make -f linux32gcc.gmk release app=mewb
        make -f linux32gcc.gmk release app=mecwb

    - name: Upload Linux Combined Release
      uses: actions/upload-artifact@v4
      with: 
        name: Release-linux-${{ env.KERNEL }}-${{ env.DIST }}-${{ env.BRANCH_NAME }}
        path: linux-${{ env.KERNEL }}-${{ env.MACHINE }}-${{ env.DIST }}-${{ env.OSV }}-microemacs-${{ env.VRS }}/*
        
    - name: Upload Brew Package
      uses: actions/upload-artifact@v4
      with: 
        name: brew-${{ env.DIST }}${{ env.OSV }}
        path: brew-*
